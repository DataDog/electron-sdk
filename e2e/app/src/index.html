<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'"
    />
    <title>E2E Test App</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        padding: 40px;
        max-width: 600px;
        margin: 0 auto;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #result {
        margin-top: 20px;
        padding: 10px;
        border-radius: 4px;
        font-weight: bold;
      }
      #result.success {
        background-color: #d4edda;
        color: #155724;
      }
      #result.error {
        background-color: #f8d7da;
        color: #721c24;
      }
    </style>
  </head>
  <body>
    <h1>E2E Test App</h1>
    <button id="init-btn">Initialize SDK</button>
    <div id="result"></div>
    <script src="renderer.js"></script>
  </body>
</html>
