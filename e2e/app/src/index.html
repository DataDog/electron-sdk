<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'"
    />
    <title>E2E Test App</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        padding: 40px;
        max-width: 600px;
        margin: 0 auto;
      }
      #status {
        margin-top: 20px;
        padding: 15px;
        border-radius: 4px;
        font-weight: 500;
      }
      #status.info {
        background-color: #d1ecf1;
        color: #0c5460;
      }
    </style>
  </head>
  <body>
    <h1>E2E Test App</h1>
    <p>SDK is automatically initialized on app launch.</p>
    <div id="status"></div>
    <button id="generate-telemetry-error">Generate Telemetry Error</button>
    <script src="renderer.js"></script>
  </body>
</html>
