version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    ignore:
      # Using a fork to have readonly modifier on types
      - dependency-name: 'json-schema-to-typescript'
    commit-message:
      prefix: '👷'

  - package-ecosystem: npm
    directory: /e2e/app
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    commit-message:
      prefix: '👷'

  - package-ecosystem: npm
    directory: /playground
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    ignore:
      # Only v39 symbols are available on the backend for now
      - dependency-name: 'electron'
    commit-message:
      prefix: '👷'
