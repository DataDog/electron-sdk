name: Tag Release

on:
  push:
    branches: [main]

permissions:
  contents: write # push release tag

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release tag if commit is a release
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:%s)
          if echo "$COMMIT_MSG" | grep -qP '^v\d+\.\d+\.\d+$'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$COMMIT_MSG"
            git push origin "$COMMIT_MSG"
            echo "✅ Tagged $COMMIT_MSG"
          else
            echo "Not a release commit, skipping."
          fi
