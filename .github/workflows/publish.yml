name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip publish and GitHub release creation (dry run)'
        type: boolean
        default: false

permissions:
  contents: write # create GitHub release
  id-token: write # npm Trusted Publishers OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "$GH_REF" != refs/tags/* ]]; then
            echo "❌ Workflow must be triggered from a tag ref, not '$GH_REF'."
            echo "Open the workflow and select the release tag (e.g. v0.1.0) in the ref dropdown."
            exit 1
          fi
          TAG="$GH_REF_NAME"
          EXPECTED="v$EXPECTED_VERSION"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "❌ Tag mismatch: expected $EXPECTED, got $TAG"
            echo "Make sure package.json version matches the tag you are publishing from."
            exit 1
          fi
          echo "✅ Release tag validated: $TAG"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '25'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify npm publish — dry run (OIDC check)
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run --provenance --access public --tag dry-run
        env:
          NODE_AUTH_TOKEN: ''

      - name: Verify GitHub token — dry run (release check)
        if: ${{ inputs.dry_run }}
        run: |
          echo "--- gh auth status ---"
          gh auth status
          echo "--- repo permissions ---"
          gh api "repos/$GITHUB_REPOSITORY" --jq '.permissions'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to npm (OIDC Trusted Publishers)
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public --provenance
        env:
          # Clear NODE_AUTH_TOKEN so npm uses the OIDC Trusted Publishers exchange
          # instead of the org-level NODE_AUTH_TOKEN secret (which is not a valid npm token).
          NODE_AUTH_TOKEN: ''

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1} found && /^## / && !/^## \[${VERSION}\]/{exit} found{print}" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "⚠️ No changelog section found for v${VERSION}"
            echo "## [${VERSION}]" > release-notes.md
          fi

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
