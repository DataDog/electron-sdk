variables:
  CI_IMAGE_REPO: 'ci/${CI_PROJECT_NAME}'
  CI_IMAGE: 'registry.ddbuild.io/ci/electron-sdk:v103674365-cf44b708@sha256:5fb8205e60fd28eba344fee63b60f98e4a8b2a11085ac5f46966489c007b89b5' # https://gitlab.ddbuild.io/DataDog/electron-sdk/-/jobs/1524560887

stages:
  - docker
  - test
  - notify

default:
  tags: ['arch:amd64']
  image: $CI_IMAGE

build-container-image:
  stage: docker
  image: 'registry.ddbuild.io/images/docker:27.3.1'
  when: manual
  id_tokens:
    DDSIGN_ID_TOKEN:
      aud: image-integrity
  script:
    - METADATA_FILE=$(mktemp)
    - CI_IMAGE_TAG="v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}"
    - docker buildx build --platform=linux/amd64 --label target=build --tag registry.ddbuild.io/${CI_IMAGE_REPO}:${CI_IMAGE_TAG} --push --metadata-file ${METADATA_FILE} .
    - ddsign sign registry.ddbuild.io/${CI_IMAGE_REPO}:${CI_IMAGE_TAG} --docker-metadata-file ${METADATA_FILE}

format:
  stage: test
  script:
    - yarn
    - yarn format:check

lint:
  stage: test
  script:
    - yarn
    - yarn lint

build:
  stage: test
  script:
    - yarn
    - yarn build

unit:
  stage: test
  script:
    - yarn
    - yarn test:unit

check-licenses:
  stage: test
  script:
    - yarn
    - node scripts/check-licenses.ts

e2e:
  stage: test
  script:
    - yarn
    - yarn test:e2e:ci
  artifacts:
    when: on_failure
    paths:
      - e2e/test-results/
      - e2e/playwright-report/

playground:
  stage: test
  script:
    - yarn
    - scripts/cli test_playground

########################################################################################################################
# Notify
########################################################################################################################

include: 'https://gitlab-templates.ddbuild.io/slack-notifier/v3-sdm/template.yml'

# override slack-notifier-base to use a different image
# fixes SDM query failures
# use same image as dd-go
.slack-notifier-base:
  stage: notify
  tags: ['arch:amd64']
  image: registry.ddbuild.io/slack-notifier:v90381551-4a2e790-sdm-gbi-jammy@sha256:472488831d14f70401316c79cd1485ad387c05dcb0536767fe73a9ec0fed3315
  script:
    # If the pipeline was launched by a user, send pings to them (eg, creating a pipe on master
    # without committing)
    - if [[ $GITLAB_USER_LOGIN = "gitsync" || $GITLAB_USER_LOGIN = "codesync" || $GITLAB_USER_LOGIN = "ddci-service-account" ]]; then EMAIL=$(git show -s --format="%ae" HEAD); else EMAIL=$GITLAB_USER_EMAIL; fi
    - SLACK_AUTHOR=$(echo $EMAIL | email2slackid || echo "")
    - if [ -z "$SLACK_AUTHOR" ]; then echo "author not found or unsubscribed"; exit 0; fi

    - BUILD_URL="$CI_PROJECT_URL/pipelines/$CI_PIPELINE_ID"

notify-failure:
  extends:
    - .slack-notifier.on-failure
